            const card = document.createElement("div");
            card.className = "question-card";

            const title = document.createElement("div");
            title.className = "question-text";
            title.innerText = qData.q;
            card.appendChild(title);

            const optionsContainer = document.createElement("div");
            optionsContainer.className = "options";

            qData.opts.forEach((optText, optIndex) => {
                const optBtn = document.createElement("div");
                optBtn.className = "option";
                optBtn.innerText = optText;
                optBtn.onclick = function() {
                    handleAnswer(optBtn, optionsContainer, optIndex, qData.ans);
                };
                optionsContainer.appendChild(optBtn);
            });

            card.appendChild(optionsContainer);
            container.appendChild(card);
        });
    }

    function handleAnswer(selectedBtn, optionsContainer, selectedIndex, correctIndex) {
        if (optionsContainer.classList.contains("disabled")) return;

        optionsContainer.classList.add("disabled");
        totalAnsweredCount++;

        const allButtons = optionsContainer.querySelectorAll(".option");

        if (selectedIndex === correctIndex) {
            selectedBtn.classList.add("correct");
            correctAnswersCount++;
        } else {
            selectedBtn.classList.add("incorrect");
            allButtons[correctIndex].classList.add("correct");
        }

        scoreSpan.innerText = correctAnswersCount;
        totalSpan.innerText = totalAnsweredCount;
    }

    renderQuiz();
</script>
</body>
</html>
