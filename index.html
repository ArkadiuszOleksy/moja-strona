<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MPH – Quiz</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1e2a;
    --surface2: #222738;
    --border: #2e3450;
    --accent: #4f7cff;
    --accent2: #7c5cff;
    --green: #22c55e;
    --green-bg: #0d2b1a;
    --green-border: #16612e;
    --red: #ef4444;
    --red-bg: #2b0d0d;
    --red-border: #7f1d1d;
    --text: #e2e8f0;
    --text-dim: #94a3b8;
    --text-dimmer: #64748b;
    --radius: 10px;
    --radius-sm: 6px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 16px; scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    min-height: 100vh;
    padding: 0 0 60px;
  }

  /* HEADER */
  header {
    background: linear-gradient(135deg, #1a1e2a 0%, #0f1117 100%);
    border-bottom: 1px solid var(--border);
    padding: 18px 20px 14px;
    position: sticky; top: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
  }
  .header-title {
    display: flex; align-items: center; gap: 10px;
  }
  .shield {
    width: 32px; height: 32px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 6px 6px 10px 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; flex-shrink: 0;
  }
  header h1 { font-size: 1.1rem; font-weight: 700; letter-spacing: .03em; }
  header h1 span { color: var(--accent); }
  .header-meta { font-size: .75rem; color: var(--text-dimmer); margin-top: 1px; }
  .header-actions { display: flex; gap: 8px; flex-shrink: 0; }
  .btn-shuffle {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none; border-radius: var(--radius-sm);
    color: #fff; font-size: .8rem; font-weight: 600;
    padding: 8px 14px; cursor: pointer;
    transition: opacity .15s, transform .1s;
    white-space: nowrap; flex-shrink: 0;
  }
  .btn-shuffle:hover { opacity: .88; transform: translateY(-1px); }
  .btn-shuffle:active { transform: translateY(0); }
  .btn-revealall {
    background: var(--surface2);
    border: 1px solid var(--border); border-radius: var(--radius-sm);
    color: var(--text-dim); font-size: .8rem; font-weight: 600;
    padding: 8px 14px; cursor: pointer;
    transition: border-color .15s, color .15s;
    white-space: nowrap; flex-shrink: 0;
  }
  .btn-revealall:hover { border-color: var(--accent); color: var(--text); }

  /* PROGRESS BAR */
  .progress-bar-wrap {
    background: var(--border); height: 3px;
  }
  .progress-bar-fill {
    height: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    transition: width .3s;
  }

  /* MAIN */
  main {
    max-width: 760px;
    margin: 0 auto;
    padding: 24px 16px 0;
    display: flex; flex-direction: column; gap: 28px;
  }

  /* QUESTION CARD */
  .q-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    transition: border-color .2s;
  }
  .q-card.all-correct { border-color: var(--green-border); }

  .q-header {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 16px 16px 12px;
    border-bottom: 1px solid var(--border);
  }
  .q-num {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 6px;
    color: #fff; font-size: .7rem; font-weight: 700;
    padding: 3px 7px; white-space: nowrap; flex-shrink: 0;
    margin-top: 2px;
  }
  .q-text {
    font-size: .97rem; font-weight: 500; line-height: 1.5; color: var(--text);
  }
  .q-badge {
    font-size: .68rem; color: var(--text-dimmer);
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 4px; padding: 2px 7px;
    white-space: nowrap; flex-shrink: 0; margin-top: 2px;
  }

  /* IMAGE */
  .q-image-wrap {
    padding: 0 16px 12px;
  }
  .q-image-wrap img {
    width: 100%; border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    display: block;
  }
  .q-image-placeholder {
    width: 100%; border-radius: var(--radius-sm);
    border: 2px dashed var(--border);
    background: var(--surface2);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 6px; padding: 20px;
    color: var(--text-dimmer); font-size: .8rem; text-align: center;
  }
  .q-image-placeholder span { font-size: 1.4rem; }

  /* OPTIONS */
  .q-options { padding: 10px 12px 12px; display: flex; flex-direction: column; gap: 7px; }

  .opt {
    display: flex; align-items: flex-start; gap: 10px;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 12px;
    cursor: pointer;
    transition: border-color .15s, background .15s;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }
  .opt:hover { border-color: var(--accent); background: #1e2436; }

  .opt.correct {
    border-color: var(--green-border) !important;
    background: var(--green-bg) !important;
  }
  .opt.incorrect {
    border-color: var(--red-border) !important;
    background: var(--red-bg) !important;
  }
  /* revealed correct answer (when using show-all) */
  .opt.reveal {
    border-color: var(--green-border) !important;
    background: var(--green-bg) !important;
  }

  .opt-checkbox {
    width: 18px; height: 18px;
    border: 2px solid var(--text-dimmer);
    border-radius: 4px; flex-shrink: 0; margin-top: 1px;
    display: flex; align-items: center; justify-content: center;
    transition: border-color .15s, background .15s;
  }
  .opt.correct .opt-checkbox, .opt.reveal .opt-checkbox {
    border-color: var(--green); background: var(--green);
  }
  .opt.incorrect .opt-checkbox {
    border-color: var(--red); background: var(--red);
  }
  .opt-checkbox svg { display: none; }
  .opt.correct .opt-checkbox svg,
  .opt.incorrect .opt-checkbox svg,
  .opt.reveal .opt-checkbox svg { display: block; }

  .opt-label {
    font-size: .88rem; line-height: 1.45; color: var(--text);
    flex: 1;
  }
  .opt.correct .opt-label, .opt.reveal .opt-label { color: #86efac; }
  .opt.incorrect .opt-label { color: #fca5a5; }

  .opt-letter {
    font-size: .7rem; font-weight: 700;
    color: var(--text-dimmer);
    background: var(--border); border-radius: 3px;
    padding: 1px 5px; flex-shrink: 0; margin-top: 1px;
  }
  .opt.correct .opt-letter, .opt.reveal .opt-letter { background: #16612e; color: #86efac; }
  .opt.incorrect .opt-letter { background: #7f1d1d; color: #fca5a5; }

  /* TEXT INPUT TYPE */
  .q-input-wrap {
    padding: 10px 16px 14px;
    display: flex; flex-direction: column; gap: 8px;
  }
  .q-input-wrap input {
    width: 100%;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-size: .9rem;
    padding: 10px 12px;
    outline: none;
    transition: border-color .15s;
  }
  .q-input-wrap input:focus { border-color: var(--accent); }
  .q-input-wrap input::placeholder { color: var(--text-dimmer); }
  .btn-check-answer {
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text-dim);
    font-size: .8rem; padding: 8px 14px;
    cursor: pointer; transition: border-color .15s, color .15s;
    align-self: flex-start;
  }
  .btn-check-answer:hover { border-color: var(--accent); color: var(--text); }
  .correct-answer-reveal {
    background: var(--green-bg);
    border: 1px solid var(--green-border);
    border-radius: var(--radius-sm);
    color: #86efac; font-size: .85rem;
    padding: 8px 12px; display: none;
  }
  .correct-answer-reveal.visible { display: block; }

  /* MULTI-CORRECT NOTE */
  .q-note {
    padding: 0 16px 8px;
    font-size: .73rem; color: var(--text-dimmer);
    display: flex; align-items: center; gap: 5px;
  }
  .q-note::before { content: "ℹ"; color: var(--accent); }

  /* MULTI FIELD */
  .multi-field-row {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 6px;
  }
  .multi-field-label {
    font-size: .85rem; font-weight: 700; color: var(--accent);
    min-width: 52px; flex-shrink: 0;
  }
  .multi-field-input {
    flex: 1;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-size: .88rem;
    padding: 8px 10px;
    outline: none;
    transition: border-color .15s;
  }
  .multi-field-input:focus { border-color: var(--accent); }
  .multi-field-input::placeholder { color: var(--text-dimmer); }

  /* SCORE PANEL */
  #score-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 20px;
    display: flex; align-items: center; justify-content: space-between; gap: 16px;
    flex-wrap: wrap;
  }
  .score-label { font-size: .8rem; color: var(--text-dimmer); margin-bottom: 4px; }
  .score-val { font-size: 1.5rem; font-weight: 800; }
  .score-val.green { color: var(--green); }
  .score-val.red { color: var(--red); }
  .score-val.blue { color: var(--accent); }
  .score-divider { width: 1px; height: 40px; background: var(--border); }

  /* FOOTER */
  .q-footer {
    padding: 8px 16px 12px;
    display: flex; align-items: center; justify-content: space-between; gap: 8px;
    flex-wrap: wrap;
  }
  .q-footer-note { font-size: .72rem; color: var(--text-dimmer); }
  .q-footer-actions { display: flex; gap: 6px; }
  .btn-reset-q, .btn-reveal-q {
    font-size: .72rem; color: var(--text-dimmer);
    background: none; border: 1px solid var(--border);
    border-radius: 4px; padding: 3px 9px;
    cursor: pointer; transition: border-color .15s, color .15s;
  }
  .btn-reset-q:hover { border-color: var(--accent); color: var(--accent); }
  .btn-reveal-q:hover { border-color: var(--green); color: var(--green); }

  @media (max-width: 600px) {
    header { padding: 12px 12px 10px; flex-wrap: wrap; }
    header h1 { font-size: .95rem; }
    main { padding: 16px 10px 0; gap: 20px; }
    .q-header { padding: 13px 12px 10px; gap: 9px; }
    .q-text { font-size: .9rem; }
    .opt { padding: 9px 10px; }
    .opt-label { font-size: .84rem; }
  }
</style>
</head>
<body>

<header>
  <div class="header-title">
    <div class="shield">⚖️</div>
    <div>
      <h1>MPH <span>Quiz</span></h1>
      <div class="header-meta">Międzynarodowe Prawo Humanitarne · <span id="q-count">0</span> pytań</div>
    </div>
  </div>
  <div class="header-actions">
    <button class="btn-revealall" onclick="toggleRevealAll()" id="btn-revealall">👁 Pokaż odpowiedzi</button>
    <button class="btn-shuffle" onclick="shuffleAll()">🔀 Losuj kolejność</button>
  </div>
</header>
<div class="progress-bar-wrap">
  <div class="progress-bar-fill" id="progress-bar" style="width:0%"></div>
</div>

<main id="main-container">
  <div id="score-panel">
    <div>
      <div class="score-label">Poprawne</div>
      <div class="score-val green" id="sc-correct">0</div>
    </div>
    <div class="score-divider"></div>
    <div>
      <div class="score-label">Błędne</div>
      <div class="score-val red" id="sc-wrong">0</div>
    </div>
    <div class="score-divider"></div>
    <div>
      <div class="score-label">Pytań łącznie</div>
      <div class="score-val blue" id="sc-total">0</div>
    </div>
    <div class="score-divider"></div>
    <div>
      <div class="score-label">Ukończone</div>
      <div class="score-val" id="sc-done" style="color:var(--text-dim)">0 / 0</div>
    </div>
  </div>
</main>

<script>
// ===================== DATA =====================
const RAW_QUESTIONS = [
  // ===== ZESTAW ABCD z kluczem (strony 5-10 PDF) =====
  { id: 1, text: "Mocarstwo opiekuńcze to:", opts: [
    { t: "Państwo niebiorące udziału w walce, sprawujące nadzór nad walczącymi w zakresie przestrzegania prawa wojennego", c: true },
    { t: "Państwo biorące udział w walce", c: false },
    { t: "ONZ", c: false },
  ]},
  { id: 2, text: "Osobami, które nie korzystają z ochrony MPH są:", opts: [
    { t: "Szpiedzy", c: true },
    { t: "Ranni powstańcy", c: false },
    { t: "Lekarze i duchowni", c: false },

  { id: 3, text: "Obiektem cywilnym zgodnie z Konwencjami Genewskimi z 1949 r. i protokołami z 1977 r. jest:", opts: [

  { id: 5, text: "Blulandia zaatakowała Westlandię. Westlandia przystąpiła do obrony. Jakie konwencje prawa międzynarodowego będą miały zastosowanie do oceny postępowania stron konfliktu?", opts: [

// ===================== STATE =====================
let questions = [];
let answered = {};   // qId -> 'correct' | 'wrong' | 'partial' | undefined
let revealAllOn = false;

function shuffle(arr) {
  const a = [...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

function shuffleAll() {
  answered = {};
  revealAllOn = false;
  document.getElementById('btn-revealall').textContent = '👁 Pokaż odpowiedzi';
  questions = shuffle(RAW_QUESTIONS).map(q => ({
    ...q,
    opts: q.opts ? shuffle(q.opts) : undefined
  }));

  document.getElementById('q-count').textContent = questions.length;
  document.getElementById('sc-total').textContent = questions.length;

  render();
  window.scrollTo({top:0, behavior:'smooth'});
}

// ===================== RENDER =====================
const LETTERS = ['A','B','C','D','E'];

function correctCountOf(q){ return q.opts ? q.opts.filter(o=>o.c).length : 0; }

function render() {
  const container = document.getElementById('main-container');
  const scorePanel = document.getElementById('score-panel');
  container.innerHTML = '';
  container.appendChild(scorePanel);

  questions.forEach((q) => {
    const card = document.createElement('div');
    card.className = 'q-card';
    card.id = `q-${q.id}`;

    const isText = q.inputType === 'text';
    const isMultiField = q.inputType === 'multi';
    const multiCorrect = q.opts && correctCountOf(q) > 1;

    // Header
    const qh = document.createElement('div');
    qh.className = 'q-header';
    qh.innerHTML = `
      <span class="q-num">#${q.id}</span>
      <span class="q-text">${q.text}</span>
      ${multiCorrect ? '<span class="q-badge">wielokrotny</span>' : ''}
    `;
    card.appendChild(qh);

    // Multi-correct note
    if(multiCorrect){
      const noteEl = document.createElement('div');
      noteEl.className = 'q-note';
      noteEl.textContent = `Zaznacz wszystkie poprawne (${correctCountOf(q)})`;
      card.appendChild(noteEl);
    }

    // Image
    if(q.img) {
      const imgWrap = document.createElement('div');
      imgWrap.className = 'q-image-wrap';
      imgWrap.innerHTML = `
        <div class="q-image-placeholder" id="img-ph-${q.id}">
          <span>🖼️</span>
          <div>Wstaw zdjęcie jako <strong>${q.img}</strong> w tym samym folderze co plik HTML</div>
        </div>
        <img id="img-${q.id}" src="${q.img}" alt="Zdjęcie do pytania ${q.id}"
          style="display:none"
          onload="document.getElementById('img-ph-${q.id}').style.display='none';this.style.display='block';"
          onerror="this.style.display='none';document.getElementById('img-ph-${q.id}').style.display='flex';"
        >
      `;
      card.appendChild(imgWrap);
    }

    // Options or text input
    if(isMultiField) {
      const wrap = document.createElement('div');
      wrap.className = 'q-input-wrap';
      let html = '';
      q.fields.forEach((f, fi) => {
        html += `<div class="multi-field-row"><span class="multi-field-label">${f.label}:</span><input type="text" id="mf-${q.id}-${fi}" placeholder="wpisz rozwinięcie…" class="multi-field-input"></div>`;
      });
      html += `<button class="btn-check-answer" onclick="revealMultiFields(${q.id})">👁 Pokaż poprawne odpowiedzi</button>`;
      q.fields.forEach((f, fi) => {
        html += `<div class="correct-answer-reveal" id="mrev-${q.id}-${fi}">✅ ${f.label}: ${f.correct}</div>`;
      });
      wrap.innerHTML = html;
      card.appendChild(wrap);
    } else if(isText) {
      const wrap = document.createElement('div');
      wrap.className = 'q-input-wrap';
      wrap.innerHTML = `
        <input type="text" id="inp-${q.id}" placeholder="Wpisz odpowiedź…">
        <button class="btn-check-answer" onclick="revealTextAnswer(${q.id})">👁 Pokaż poprawną odpowiedź</button>
        <div class="correct-answer-reveal" id="rev-${q.id}">
          ✅ Poprawna odpowiedź: ${q.correctText}
        </div>
      `;
      card.appendChild(wrap);
    } else {
      const optsWrap = document.createElement('div');
      optsWrap.className = 'q-options';
      optsWrap.id = `opts-${q.id}`;

      q.opts.forEach((opt, oi) => {
        const el = document.createElement('div');
        el.className = 'opt';
        el.id = `opt-${q.id}-${oi}`;
        el.dataset.qid = q.id;
        el.dataset.oi = oi;
        el.dataset.correct = opt.c;
        el.innerHTML = `
          <span class="opt-letter">${LETTERS[oi]}</span>
          <span class="opt-checkbox">
            <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
              <path d="M1.5 5l2.5 2.5 4.5-4" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </span>
          <span class="opt-label">${opt.t}</span>
        `;
        el.addEventListener('click', () => handleClick(q.id, oi));
        optsWrap.appendChild(el);
      });
      card.appendChild(optsWrap);
    }

    // Footer
    const footer = document.createElement('div');
    footer.className = 'q-footer';
    const revealBtn = q.opts ? `<button class="btn-reveal-q" onclick="revealQ(${q.id})">👁 Odpowiedź</button>` : '';
    footer.innerHTML = `
      <span class="q-footer-note" id="fn-${q.id}"></span>
      <span class="q-footer-actions">
        ${revealBtn}
        <button class="btn-reset-q" onclick="resetQ(${q.id})">↺ Reset</button>
      </span>
    `;
    card.appendChild(footer);

    container.appendChild(card);
  });

  updateScore();
  updateProgress();
}

function handleClick(qid, oi) {
  const q = questions.find(x=>x.id===qid);
  if(!q || !q.opts) return;

  const el = document.getElementById(`opt-${qid}-${oi}`);
  el.classList.remove('reveal');
  const isCorrect = q.opts[oi].c;
  const isActive = el.classList.contains('correct') || el.classList.contains('incorrect');

  if(isActive) {
    el.classList.remove('correct','incorrect');
    recomputeScore(qid);
    return;
  }

  if(isCorrect) {
    el.classList.add('correct');
  } else {
    el.classList.add('incorrect');
  }
  recomputeScore(qid);
}

function recomputeScore(qid) {
  const q = questions.find(x=>x.id===qid);
  if(!q||!q.opts) return;

  let anySelected = false;
  let anyWrong = false;
  let correctSelected = 0;
  const totalCorrect = q.opts.filter(o=>o.c).length;

  q.opts.forEach((opt,oi) => {
    const el = document.getElementById(`opt-${qid}-${oi}`);
    if(el.classList.contains('correct')) { correctSelected++; anySelected=true; }
    if(el.classList.contains('incorrect')) { anyWrong=true; anySelected=true; }
  });

  const card = document.getElementById(`q-${qid}`);
  const fn = document.getElementById(`fn-${qid}`);

  if(!anySelected) {
    card.classList.remove('all-correct');
    fn.textContent = '';
    fn.style.color = 'var(--text-dimmer)';
    answered[qid] = undefined;
  } else if(correctSelected === totalCorrect && !anyWrong) {
    card.classList.add('all-correct');
    fn.textContent = '✅ Wszystkie poprawne!';
    fn.style.color = 'var(--green)';
    answered[qid] = 'correct';
  } else if(anyWrong) {
    card.classList.remove('all-correct');
    fn.textContent = '❌ Zaznaczono błędną odpowiedź';
    fn.style.color = 'var(--red)';
    answered[qid] = 'wrong';
  } else {
    card.classList.remove('all-correct');
    fn.textContent = `✔ ${correctSelected} z ${totalCorrect} poprawnych`;
    fn.style.color = 'var(--accent)';
    answered[qid] = 'partial';
  }
  updateScore();
  updateProgress();
}

function resetQ(qid) {
  const q = questions.find(x=>x.id===qid);
  if(!q) return;
  if(q.opts) {
    q.opts.forEach((_,oi)=>{
      const el = document.getElementById(`opt-${qid}-${oi}`);
      if(el) el.classList.remove('correct','incorrect','reveal');
    });
  }
  const card = document.getElementById(`q-${qid}`);
  card.classList.remove('all-correct');
  const fn = document.getElementById(`fn-${qid}`);
  if(fn) { fn.textContent=''; }
  answered[qid] = undefined;
  updateScore();
  updateProgress();
}

// reveal correct answers for a single question (no scoring)
function revealQ(qid) {
  const q = questions.find(x=>x.id===qid);
  if(!q||!q.opts) return;
  q.opts.forEach((opt,oi)=>{
    const el = document.getElementById(`opt-${qid}-${oi}`);
    if(!el) return;
    el.classList.remove('correct','incorrect');
    if(opt.c) el.classList.add('reveal');
    else el.classList.remove('reveal');
  });
  const fn = document.getElementById(`fn-${qid}`);
  if(fn){ fn.textContent='👁 Pokazano poprawne odpowiedzi'; fn.style.color='var(--green)'; }
}

function toggleRevealAll(){
  revealAllOn = !revealAllOn;
  const btn = document.getElementById('btn-revealall');
  if(revealAllOn){
    btn.textContent = '🙈 Ukryj odpowiedzi';
    questions.forEach(q=>{ if(q.opts) revealQ(q.id); });
  } else {
    btn.textContent = '👁 Pokaż odpowiedzi';
    questions.forEach(q=>{
      if(q.opts) q.opts.forEach((_,oi)=>{
        const el=document.getElementById(`opt-${q.id}-${oi}`);
        if(el) el.classList.remove('reveal');
      });
      const fn=document.getElementById(`fn-${q.id}`);
      if(fn && !answered[q.id]){ fn.textContent=''; }
    });
  }
}

function revealTextAnswer(qid) {
  const rev = document.getElementById(`rev-${qid}`);
  if(rev) rev.classList.toggle('visible');
}

function revealMultiFields(qid) {
  const q = questions.find(x=>x.id===qid);
  if(!q||!q.fields) return;
  q.fields.forEach((_,fi) => {
    const rev = document.getElementById(`mrev-${qid}-${fi}`);
    if(rev) rev.classList.toggle('visible');
  });
}

function updateScore() {
  let c=0,w=0,done=0;
  Object.values(answered).forEach(v=>{
    if(v==='correct'){c++;done++;}
    else if(v==='wrong'){w++;done++;}
    else if(v==='partial'){done++;}
  });
  document.getElementById('sc-correct').textContent = c;
  document.getElementById('sc-wrong').textContent = w;
  document.getElementById('sc-done').textContent = `${done} / ${questions.length}`;
}

function updateProgress() {
  const done = Object.values(answered).filter(v=>v).length;
  const pct = questions.length ? (done/questions.length*100) : 0;
  document.getElementById('progress-bar').style.width = pct+'%';
}

// Init
shuffleAll();
</script>
</body>
</html>
